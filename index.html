<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff4e88,#ff7eb3);
text-align:center;
color:white;
padding-top:120px;
}

h1{
font-size:60px;
}

p{
font-size:22px;
width:70%;
margin:auto;
}

button{
margin-top:30px;
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
cursor:pointer;
}

#message{
display:none;
font-size:26px;
margin-top:40px;
}

</style>

</head>

<body>

<h1>Happy Birthday ❤️</h1>

<p>
To the most amazing girl in my life.
You make every day better just by being in it.
</p>

<button onclick="showMessage()">Open Your Surprise 🎁</button>

<div id="message">
You are the best thing that ever happened to me.
I hope your birthday is as beautiful as you are.
</div>

<script>

function showMessage(){
document.getElementById("message").style.display="block";
}

</script>

</body>
</html>
